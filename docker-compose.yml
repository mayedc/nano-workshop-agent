version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: nwa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nwa_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nano_workshop}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nwa} -d ${POSTGRES_DB:-nano_workshop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nwa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: nwa-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:

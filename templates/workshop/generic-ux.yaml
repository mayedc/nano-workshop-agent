id: generic-ux
name: Generic UX Workshop
description: >
  A flexible workshop template for general UX research and design activities,
  supporting various domains and research methods.

input_roles:
  - participant
  - moderator
  - observer
  - stakeholder

analysis_modules:
  - thematic_analysis
  - affinity_diagramming
  - journey_mapping
  - persona_extraction

workflow_steps:
  - id: 1
    name: Upload Materials
    agent_name: PreprocessingAgent
    status: pending
    depends_on: []
  - id: 2
    name: Define Goals
    agent_name: GoalUnderstandingAgent
    status: pending
    depends_on: [1]
  - id: 3
    name: Preprocess Data
    agent_name: PreprocessingAgent
    status: pending
    depends_on: [1]
  - id: 4
    name: Qualitative Analysis
    agent_name: QualitativeAnalysisAgent
    status: pending
    depends_on: [3]
  - id: 5
    name: Quantitative Analysis
    agent_name: QuantitativeAnalysisAgent
    status: pending
    depends_on: [3]
  - id: 6
    name: Synthesis and Insights
    agent_name: DesignInsightAgent
    status: pending
    depends_on: [4, 5]
  - id: 7
    name: Expert Review
    agent_name: ExpertReviewAgent
    status: pending
    depends_on: [6]
  - id: 8
    name: Export
    agent_name: ExportAgent
    status: pending
    depends_on: [7]

ontology:
  concepts:
    - usability
    - satisfaction
    - efficiency
    - learnability
    - accessibility
  relationships:
    - usability -> satisfaction
    - efficiency -> usability
    - learnability -> usability

output_types:
  - thematic_map
  - journey_map
  - persona_cards
  - recommendation_list
  - presentation

report_structure:
  - title: Summary
    type: text
    source_steps: [2]
  - title: Findings
    type: chart
    source_steps: [4, 5]
  - title: Recommendations
    type: text
    source_steps: [6]

id: ux_research_workshop
name: UX Research Workshop
description: Extract personas, pain points, and design opportunities from UX research sessions.

input_roles:
  - interview_recordings
  - observation_notes
  - survey_responses
  - usability_test_videos
  - diary_studies
  - competitive_analysis

analysis_modules:
  - persona_extraction
  - pain_point_analysis
  - journey_mapping
  - thematic_analysis
  - opportunity_generation

output_types:
  - user_journey_map
  - pain_point_matrix
  - ux_insight_report
  - design_opportunity_list
  - persona_cards
  - final_report

ontology:
  concepts:
    - usability
    - satisfaction
    - efficiency
    - learnability
    - accessibility
  relationships:
    - usability -> satisfaction
    - efficiency -> usability
    - learnability -> usability
  participant_groups:
    - end_user
    - power_user
    - novice_user
  need_categories:
    - functionality
    - usability
    - delight

workflow_steps:
  - id: 1
    name: Upload Research Materials
    agent_name: PreprocessingAgent
    status: pending
    depends_on: []
  - id: 2
    name: Define Research Questions
    agent_name: GoalUnderstandingAgent
    status: pending
    depends_on: [1]
  - id: 3
    name: Preprocess Data
    agent_name: PreprocessingAgent
    status: pending
    depends_on: [1]
  - id: 4
    name: Qualitative Analysis
    agent_name: QualitativeAnalysisAgent
    status: pending
    depends_on: [3]
  - id: 5
    name: Quantitative Analysis
    agent_name: QuantitativeAnalysisAgent
    status: pending
    depends_on: [3]
  - id: 6
    name: Thematic Analysis
    agent_name: ThemeExtractionAgent
    status: pending
    depends_on: [4]
  - id: 7
    name: Design Synthesis
    agent_name: DesignInsightAgent
    status: pending
    depends_on: [5, 6]
  - id: 8
    name: Concept Generation
    agent_name: DesignConceptAgent
    status: pending
    depends_on: [7]
  - id: 9
    name: Expert Review
    agent_name: ExpertReviewAgent
    status: pending
    depends_on: [8]
  - id: 10
    name: Export Insights
    agent_name: ExportAgent
    status: pending
    depends_on: [9]

report_structure:
  - title: Research Overview
    type: text
    source_steps: [2]
  - title: User Personas
    type: text
    source_steps: [4]
  - title: Key Themes
    type: chart
    source_steps: [6]
  - title: Design Insights
    type: text
    source_steps: [7]
  - title: Concept Designs
    type: image
    source_steps: [8]
  - title: Recommendations
    type: text
    source_steps: [7]

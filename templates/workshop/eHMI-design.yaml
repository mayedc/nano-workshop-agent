id: ehmi_design_concepts
name: eHMI Autonomous Vehicle Co-Design
description: >
  A workshop template for designing external Human-Machine Interfaces (eHMI)
  for autonomous vehicles through co-design sessions with pedestrians,
  cyclists, and drivers.

input_roles:
  - pedestrian
  - cyclist
  - driver
  - urban_planner
  - automotive_designer
  - hci_researcher

analysis_modules:
  - thematic_analysis
  - requirement_extraction
  - sentiment_analysis
  - design_insight_generation
  - prototype_concept_generation

workflow_steps:
  - id: 1
    name: Upload Workshop Materials
    agent_name: PreprocessingAgent
    status: pending
    depends_on: []
  - id: 2
    name: Define Research Goal
    agent_name: GoalUnderstandingAgent
    status: pending
    depends_on: [1]
  - id: 3
    name: Process Recordings
    agent_name: PreprocessingAgent
    status: pending
    depends_on: [1]
  - id: 4
    name: Metadata Fusion
    agent_name: MetadataFusionAgent
    status: pending
    depends_on: [3]
  - id: 5
    name: Thematic Analysis
    agent_name: ThemeExtractionAgent
    status: pending
    depends_on: [4]
  - id: 6
    name: Quantitative Analysis
    agent_name: QuantitativeAnalysisAgent
    status: pending
    depends_on: [4]
  - id: 7
    name: Design Insight Generation
    agent_name: DesignInsightAgent
    status: pending
    depends_on: [5, 6]
  - id: 8
    name: Expert Review
    agent_name: ExpertReviewAgent
    status: pending
    depends_on: [7]
  - id: 9
    name: Concept Design Generation
    agent_name: DesignConceptAgent
    status: pending
    depends_on: [8]
  - id: 10
    name: Export Reports
    agent_name: ExportAgent
    status: pending
    depends_on: [9]

ontology:
  concepts:
    - trust
    - intention
    - visibility
    - cultural_context
    - accessibility
  relationships:
    - trust -> intention
    - visibility -> trust
    - cultural_context -> trust
    - accessibility -> visibility

output_types:
  - thematic_map
  - requirement_list
  - design_guidelines
  - prototype_concepts
  - statistical_report
  - presentation

report_structure:
  - title: Executive Summary
    type: text
    source_steps: [2]
  - title: Methodology
    type: text
    source_steps: [1, 2]
  - title: Thematic Analysis
    type: chart
    source_steps: [5]
  - title: Quantitative Findings
    type: table
    source_steps: [6]
  - title: Design Insights
    type: text
    source_steps: [7]
  - title: Prototype Concepts
    type: image
    source_steps: [9]
  - title: Recommendations
    type: text
    source_steps: [7, 9]
